services:
  - type: web
    name: tradepulse-api
    runtime: python
    rootDir: backend
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: sqlite:///./tmp/tradepulse.db
      - key: RENDER
        value: "true"
    plan: free
